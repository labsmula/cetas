[profile.default]
src = "src"
out = "out"
libs = ["../lib"]

remappings = [
    "@openzeppelin/contracts/=../lib/openzeppelin-contracts/contracts/",
    "forge-std/=../lib/openzeppelin-contracts/lib/forge-std/src/",
]

solc = "0.8.27"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = true

[rpc_endpoints]
celo_sepolia = "${CELO_SEPOLIA_RPC_URL}"
celo = "${CELO_RPC_URL}"

[etherscan]
celo_sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://api-sepolia.celoscan.xyz/api" }
celo = { key = "${ETHERSCAN_API_KEY}", url = "https://api.celoscan.xyz/api" }